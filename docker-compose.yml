services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5050}:5050"
    environment:
      PORT: "5050"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-found2work-docker-dev-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend
